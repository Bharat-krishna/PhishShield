<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>PhishShield SOC Dashboard</title>

    <!-- GOOGLE FONT -->
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet"
    >

    <!-- CHART JS -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            background:
            radial-gradient(circle at top,
            rgba(0,255,170,0.08),
            transparent 30%),
            #050816;

            color:#e2e8f0;

            font-family:'Inter',sans-serif;

            min-height:100vh;

            padding:30px;

            overflow-x:hidden;
        }

        /* GRID BACKGROUND */

        body::before{

            content:"";

            position:fixed;

            inset:0;

            background-image:
            linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);

            background-size:40px 40px;

            pointer-events:none;

            z-index:-1;
        }

        .header{

            display:flex;
            justify-content:space-between;
            align-items:center;

            margin-bottom:35px;

            padding:20px 28px;

            background:rgba(15,23,42,0.7);

            border:1px solid rgba(0,255,170,0.15);

            border-radius:22px;

            backdrop-filter:blur(14px);

            box-shadow:
            0 0 25px rgba(0,255,170,0.08);
        }

        .title{

            font-family:'Orbitron',sans-serif;

            font-size:34px;

            font-weight:700;

            color:#00ffaa;

            letter-spacing:2px;

            text-shadow:
            0 0 12px rgba(0,255,170,0.4);
        }

        .subtitle{

            margin-top:6px;

            color:#94a3b8;

            font-size:14px;
        }

        .live{

            padding:14px 24px;

            border-radius:14px;

            background:
            linear-gradient(135deg,
            #00ffaa,
            #00c3ff);

            color:#02111b;

            font-weight:700;

            cursor:pointer;

            transition:0.3s;

            box-shadow:
            0 0 18px rgba(0,255,170,0.4);
        }

        .live:hover{

            transform:translateY(-2px) scale(1.02);

            box-shadow:
            0 0 28px rgba(0,255,170,0.65);
        }

        .stats-grid{

            display:grid;

            grid-template-columns:
            repeat(auto-fit,minmax(220px,1fr));

            gap:20px;

            margin-bottom:30px;
        }

        .stat-card{

            background:rgba(15,23,42,0.75);

            border:1px solid rgba(255,255,255,0.08);

            border-radius:22px;

            padding:24px;

            backdrop-filter:blur(10px);

            transition:0.3s;
        }

        .stat-card:hover{

            transform:translateY(-4px);

            border-color:rgba(0,255,170,0.3);

            box-shadow:
            0 0 25px rgba(0,255,170,0.12);
        }

        .stat-title{

            color:#94a3b8;

            font-size:13px;

            margin-bottom:10px;

            text-transform:uppercase;

            letter-spacing:1px;
        }

        .stat-value{

            font-size:36px;

            font-weight:700;

            color:#ffffff;
        }

        .feed{

            display:flex;

            flex-direction:column;

            gap:22px;
        }

        .card{

            background:rgba(15,23,42,0.75);

            border:1px solid rgba(255,255,255,0.06);

            border-left:5px solid #00ffaa;

            border-radius:22px;

            padding:24px;

            backdrop-filter:blur(10px);

            transition:0.35s;

            position:relative;

            overflow:hidden;
        }

        .card::before{

            content:"";

            position:absolute;

            inset:0;

            background:
            linear-gradient(90deg,
            transparent,
            rgba(255,255,255,0.03),
            transparent);

            transform:translateX(-100%);

            transition:0.8s;
        }

        .card:hover::before{
            transform:translateX(100%);
        }

        .card:hover{

            transform:translateY(-5px);

            box-shadow:
            0 0 30px rgba(0,255,170,0.12);
        }

        .safe{
            border-left-color:#00ffaa;
        }

        .suspicious{
            border-left-color:#ffb020;
        }

        .high{
            border-left-color:#ff3b5c;
        }

        .row{
            margin-bottom:16px;
        }

        .label{

            color:#64748b;

            font-size:12px;

            text-transform:uppercase;

            letter-spacing:1px;

            margin-bottom:6px;
        }

        .value{

            color:#f8fafc;

            font-size:16px;

            line-height:1.6;

            word-break:break-word;
        }

        .badge{

            display:inline-flex;

            align-items:center;

            gap:8px;

            padding:10px 18px;

            border-radius:999px;

            font-size:13px;

            font-weight:700;

            letter-spacing:0.5px;
        }

        .badge-safe{

            background:rgba(0,255,170,0.12);

            color:#00ffaa;

            border:1px solid rgba(0,255,170,0.2);
        }

        .badge-suspicious{

            background:rgba(255,176,32,0.12);

            color:#ffb020;

            border:1px solid rgba(255,176,32,0.2);
        }

        .badge-high{

            background:rgba(255,59,92,0.12);

            color:#ff3b5c;

            border:1px solid rgba(255,59,92,0.2);
        }

        /* MODAL */

        .modal{

            display:none;

            position:fixed;

            inset:0;

            background:rgba(2,6,23,0.85);

            backdrop-filter:blur(10px);

            z-index:999;
        }

        .modal-content{

            width:75%;

            margin:4% auto;

            background:#08111f;

            border:1px solid rgba(0,255,170,0.15);

            border-radius:28px;

            padding:35px;

            box-shadow:
            0 0 40px rgba(0,255,170,0.15);

            position:relative;
        }

        .modal-title{

            font-family:'Orbitron',sans-serif;

            color:#00ffaa;

            margin-bottom:25px;

            font-size:24px;
        }

        .close{

            position:absolute;

            right:24px;
            top:18px;

            font-size:34px;

            color:#94a3b8;

            cursor:pointer;

            transition:0.3s;
        }

        .close:hover{
            color:#ffffff;
            transform:scale(1.1);
        }

    </style>

</head>

<body>

    <!-- HEADER -->

    <div class="header">

        <div>

            <div class="title">
                PHISHSHIELD SOC
            </div>

            <div class="subtitle">
                Real-Time Email Threat Monitoring System
            </div>

        </div>

        <div
            class="live"
            onclick="toggleAnalytics()"
        >
            VIEW THREAT ANALYTICS
        </div>

    </div>

    <!-- STATS -->

    <div class="stats-grid">

        <div class="stat-card">
            <div class="stat-title">Total Emails Scanned</div>
            <div class="stat-value" id="totalEmails">0</div>
        </div>

        <div class="stat-card">
            <div class="stat-title">Safe Emails</div>
            <div class="stat-value" id="safeCount">0</div>
        </div>

        <div class="stat-card">
            <div class="stat-title">Suspicious Emails</div>
            <div class="stat-value" id="suspiciousCount">0</div>
        </div>

        <div class="stat-card">
            <div class="stat-title">High Risk Threats</div>
            <div class="stat-value" id="highCount">0</div>
        </div>

    </div>

    <!-- FEED -->

    <div class="feed" id="feed"></div>

    <!-- MODAL -->

    <div
        id="analyticsModal"
        class="modal"
    >

        <div class="modal-content">

            <span
                class="close"
                onclick="closeAnalytics()"
            >
                &times;
            </span>

            <div class="modal-title">
                Threat Intelligence Analytics
            </div>

            <canvas id="threatChart"></canvas>

        </div>

    </div>

    <script>

        async function loadEmails(){

            const response = await fetch(
                "/api/threats"
            )

            const data = await response.json()

            const feed = document.getElementById(
                "feed"
            )

            feed.innerHTML = ""

            let safe = 0
            let suspicious = 0
            let high = 0

            data.reverse().forEach(mail => {

                let cardClass = "safe"
                let badgeClass = "badge-safe"

                if(mail.status === "HIGH RISK"){

                    cardClass = "high"
                    badgeClass = "badge-high"
                    high++
                }

                else if(mail.status === "SUSPICIOUS"){

                    cardClass = "suspicious"
                    badgeClass = "badge-suspicious"
                    suspicious++
                }

                else{
                    safe++
                }

                feed.innerHTML += `

                    <div class="card ${cardClass}">

                        <div class="row">
                            <div class="label">
                                Sender
                            </div>

                            <div class="value">
                                ${mail.sender}
                            </div>
                        </div>

                        <div class="row">
                            <div class="label">
                                Subject
                            </div>

                            <div class="value">
                                ${mail.subject}
                            </div>
                        </div>

                        <div class="row">
                            <div class="label">
                                Email Preview
                            </div>

                            <div class="value">
                                ${mail.body}
                            </div>
                        </div>

                        <div class="row">
                            <div class="label">
                                Risk Score
                            </div>

                            <div class="value">
                                ${mail.risk_score}
                            </div>
                        </div>

                        <div class="badge ${badgeClass}">
                            ${mail.status}
                        </div>

                    </div>
                `
            })

            document.getElementById("totalEmails").innerText = data.length
            document.getElementById("safeCount").innerText = safe
            document.getElementById("suspiciousCount").innerText = suspicious
            document.getElementById("highCount").innerText = high
        }

        loadEmails()

        setInterval(loadEmails, 1000)

        function toggleAnalytics(){

            document.getElementById(
                "analyticsModal"
            ).style.display = "block"

            generateChart()
        }

        function closeAnalytics(){

            document.getElementById(
                "analyticsModal"
            ).style.display = "none"
        }

        let chartInstance = null

        async function generateChart(){

            const response = await fetch(
                "/api/threats"
            )

            const data = await response.json()

            let safe = 0
            let suspicious = 0
            let high = 0

            data.forEach(mail => {

                if(mail.status === "SAFE"){
                    safe++
                }

                else if(mail.status === "SUSPICIOUS"){
                    suspicious++
                }

                else if(mail.status === "HIGH RISK"){
                    high++
                }
            })

            const ctx = document.getElementById(
                "threatChart"
            )

            if(chartInstance){
                chartInstance.destroy()
            }

            chartInstance = new Chart(ctx, {

                type: "bar",

                data: {

                    labels: [
                        "SAFE",
                        "SUSPICIOUS",
                        "HIGH RISK"
                    ],

                    datasets: [{

                        data: [
                            safe,
                            suspicious,
                            high
                        ],

                        backgroundColor: [
                            "#00ffaa",
                            "#ffb020",
                            "#ff3b5c"
                        ],

                        borderWidth:0,

                        borderRadius:12,

                        barThickness:70
                    }]
                },

                options: {

                    responsive:true,

                    plugins:{

                        legend:{

                            labels:{
                                color:"white"
                            }
                        }
                    },

                    scales:{

                        x:{
                            ticks:{
                                color:"white"
                            },
                            grid:{
                                color:"rgba(255,255,255,0.05)"
                            }
                        },

                        y:{
                            ticks:{
                                color:"white"
                            },
                            grid:{
                                color:"rgba(255,255,255,0.05)"
                            }
                        }
                    }
                }
            })
        }

    </script>

</body>

</html>
