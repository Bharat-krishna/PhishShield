<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PhishShield — URL Threat Scanner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="bg-grid" aria-hidden="true"></div>

  <header class="header">
    <div class="logo">
      <span class="logo-icon" aria-hidden="true">🛡</span>
      <span class="logo-text">Phish<span class="accent">Shield</span></span>
    </div>
    <p class="tagline">Heuristic phishing URL detection</p>
  </header>

  <main class="container">
    <section class="scan-card" aria-labelledby="scan-heading">
      <h1 id="scan-heading" class="sr-only">Scan a URL</h1>

      <form id="scan-form" class="scan-form" novalidate>
        <label for="url-input" class="input-label">Enter URL to analyze</label>
        <div class="input-row">
          <input
            type="url"
            id="url-input"
            name="url"
            placeholder="https://example.com/suspicious-link"
            autocomplete="off"
            spellcheck="false"
            required
          >
          <button type="submit" id="scan-btn" class="btn-primary">
            <span class="btn-text">Scan URL</span>
            <span class="btn-spinner" hidden aria-hidden="true"></span>
          </button>
        </div>
        <p id="form-error" class="form-error" role="alert" hidden></p>
      </form>

      <section id="results" class="results" hidden aria-live="polite">
        <div class="score-panel">
          <div class="score-ring" id="score-ring">
            <svg viewBox="0 0 120 120" aria-hidden="true">
              <circle class="ring-bg" cx="60" cy="60" r="52"></circle>
              <circle class="ring-fill" id="ring-fill" cx="60" cy="60" r="52"></circle>
            </svg>
            <div class="score-value">
              <span id="threat-score">0</span>
              <span class="score-unit">/ 100</span>
            </div>
          </div>
          <div class="score-meta">
            <span id="risk-badge" class="risk-badge">—</span>
            <p class="scanned-url" id="scanned-url"></p>
            <p class="scan-time" id="scan-time"></p>
          </div>
        </div>

        <div class="findings-panel">
          <h2>Analysis details</h2>
          <ul id="findings-list" class="findings-list"></ul>
        </div>
      </section>
    </section>

    <aside class="history-card" aria-labelledby="history-heading">
      <h2 id="history-heading">Recent scans</h2>
      <ul id="history-list" class="history-list">
        <li class="history-empty">No scans yet. Analyze a URL to get started.</li>
      </ul>
    </aside>
  </main>

  <footer class="footer">
    <p>PhishShield uses heuristic analysis — not a substitute for professional security tools.</p>
  </footer>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
